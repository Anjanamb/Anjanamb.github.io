<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anjana's Portfolio — Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff41;
    --green-dim: #00cc33;
    --green-glow: #00ff4180;
    --green-dark: #003b00;
    --green-bg: #00ff4108;
    --amber: #ffb000;
    --cyan: #00e5ff;
    --magenta: #ff00ff;
    --red: #ff3333;
    --bg: #0a0a0a;
    --bg-light: #111111;
    --bg-lighter: #1a1a1a;
    --border: #00ff4125;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--green);
    font-family: 'Fira Code', 'JetBrains Mono', monospace;
    overflow: hidden;
  }

  /* CRT Scanline Overlay */
  .crt-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
  }
  .crt-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 255, 65, 0.015) 2px,
      rgba(0, 255, 65, 0.015) 4px
    );
  }
  .crt-overlay::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.8; }
    94% { opacity: 1; }
    96% { opacity: 0.9; }
    97% { opacity: 1; }
  }

  .terminal-wrapper {
    height: 100vh;
    display: flex;
    flex-direction: column;
    animation: flicker 8s infinite;
  }

  /* Title Bar */
  .title-bar {
    background: var(--bg-lighter);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .title-bar-dots { display: flex; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green { background: #28c840; }
  .title-bar-text {
    flex: 1;
    text-align: center;
    font-size: 12px;
    color: #555;
    letter-spacing: 1px;
  }

  /* Tab Bar */
  .tab-bar {
    background: var(--bg-light);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 8px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .tab {
    padding: 8px 18px;
    font-size: 12px;
    color: #555;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: inherit;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .tab:hover { color: var(--green-dim); }
  .tab.active {
    color: var(--green);
    border-bottom-color: var(--green);
    text-shadow: 0 0 10px var(--green-glow);
  }

  /* Terminal Body */
  .terminal-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scroll-behavior: smooth;
  }
  .terminal-body::-webkit-scrollbar { width: 6px; }
  .terminal-body::-webkit-scrollbar-track { background: var(--bg); }
  .terminal-body::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 3px; }
  .terminal-body::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }

  .line {
    margin-bottom: 4px;
    line-height: 1.7;
    font-size: 14px;
  }
  .prompt { color: var(--cyan); font-weight: 600; }
  .command { color: var(--green); font-weight: 500; }
  .comment { color: #555; font-style: italic; }
  .highlight { color: var(--amber); }
  .accent { color: var(--cyan); }
  .error { color: var(--red); }
  .magenta { color: var(--magenta); }

  .ascii-art {
    color: var(--green);
    text-shadow: 0 0 15px var(--green-glow), 0 0 30px var(--green-glow);
    font-size: 11px;
    line-height: 1.2;
    margin: 8px 0;
    white-space: pre;
  }

  .section-header {
    color: var(--amber);
    font-weight: 700;
    font-size: 13px;
    margin: 16px 0 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px dashed var(--border);
    padding-bottom: 4px;
  }

  .tree-item {
    padding-left: 24px;
    position: relative;
    margin-bottom: 4px;
  }
  .tree-item::before {
    content: '├── ';
    color: #444;
    position: absolute;
    left: 0;
  }
  .tree-item:last-child::before { content: '└── '; }

  /* Skill Bars */
  .skill-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 3px 0;
    padding-left: 20px;
  }
  .skill-name { min-width: 160px; font-size: 13px; }
  .skill-bar {
    flex: 1;
    max-width: 280px;
    height: 10px;
    background: var(--bg-lighter);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .skill-fill {
    height: 100%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green-glow);
    transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
    width: 0;
  }
  .skill-pct { font-size: 11px; color: var(--green-dim); min-width: 35px; }

  /* Project Cards */
  .project-card {
    border: 1px solid var(--border);
    background: var(--green-bg);
    padding: 12px 16px;
    margin: 8px 0 8px 20px;
    border-radius: 3px;
    transition: all 0.3s;
  }
  .project-card:hover {
    border-color: var(--green-dim);
    box-shadow: 0 0 15px var(--green-glow);
    background: rgba(0, 255, 65, 0.05);
  }
  .project-title { color: var(--cyan); font-weight: 600; font-size: 14px; }
  .project-desc { color: var(--green-dim); font-size: 12px; margin-top: 4px; }
  .project-tech { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
  .tech-tag {
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--green-dark);
    border-radius: 3px;
    color: var(--amber);
    background: rgba(255, 176, 0, 0.05);
  }

  /* Input */
  .input-line {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg-light);
    flex-shrink: 0;
  }
  .input-prompt { color: var(--cyan); font-weight: 600; font-size: 14px; }
  .input-field {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--green);
    font-family: inherit;
    font-size: 14px;
    caret-color: var(--green);
  }

  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  .status-bar {
    background: var(--green-dark);
    color: var(--green);
    padding: 4px 16px;
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }

  a { color: var(--cyan); text-decoration: none; transition: all 0.2s; }
  a:hover { color: var(--green); text-shadow: 0 0 8px var(--green-glow); }

  .matrix-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.03; }

  @keyframes bootGlow {
    0% { text-shadow: none; }
    50% { text-shadow: 0 0 20px var(--green-glow), 0 0 40px var(--green-glow); }
    100% { text-shadow: 0 0 10px var(--green-glow); }
  }
  .boot-glow { animation: bootGlow 2s ease-out; }

  .help-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 2px 16px;
    padding-left: 20px;
    font-size: 13px;
  }
  .help-cmd { color: var(--cyan); }
  .help-desc { color: var(--green-dim); }

  @media (max-width: 600px) {
    .ascii-art { font-size: 7px; }
    .skill-name { min-width: 100px; font-size: 11px; }
    .terminal-body { padding: 12px; }
    .help-grid { grid-template-columns: 100px 1fr; font-size: 11px; }
    .project-card { margin-left: 8px; }
  }
</style>
</head>

// ── Matrix Rain ──
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(1);
function drawMatrix() {
  ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 50);

// ── Clock ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false }) + ' | UTF-8 | LF';
}
setInterval(updateClock, 1000);
updateClock();

// ── Rendering ──
const body = document.getElementById('terminalBody');
const input = document.getElementById('inputField');

function renderTab(tabName) {
  const fn = CONTENT[tabName];
  if (!fn) {
    body.innerHTML = `<div class="line"><span class="error">bash: ${tabName}: command not found</span></div>
    <div class="line"><span class="comment">// Type 'help' to see available commands</span></div>`;
    return;
  }
  body.innerHTML = fn();
  body.scrollTop = 0;
  animateSkillBars();
}

function animateSkillBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.skill-fill').forEach((bar, i) => {
      setTimeout(() => { bar.style.width = bar.dataset.pct + '%'; }, i * 80);
    });
  });
}

// ── Tab clicks ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelector('.tab.active')?.classList.remove('active');
    tab.classList.add('active');
    renderTab(tab.dataset.tab);
  });
});

// ── Command input ──
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const cmd = input.value.trim().toLowerCase();
    input.value = '';
    if (cmd === 'clear') { body.innerHTML = ''; return; }
    const tabBtn = document.querySelector(`.tab[data-tab="${cmd}"]`);
    if (tabBtn) {
      document.querySelector('.tab.active')?.classList.remove('active');
      tabBtn.classList.add('active');
    }
    renderTab(cmd);
  }
});

// ── Init ──
renderTab('home');
document.addEventListener('click', (e) => {
  if (!e.target.closest('a') && !e.target.closest('.tab')) input.focus();
});
</script>
